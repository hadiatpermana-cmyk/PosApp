<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <aside class="sidebar" id="mainSidebar">
        <div class="sidebar-header">Point of Sale</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active" onclick="window.location.href='dashboard.html'">Dashboard</li>
            <li class="sidebar-item" onclick="window.location.href='barang.html'">Master Barang</li>
            <li class="sidebar-item" onclick="window.location.href='agen.html'">Agen / Konsumen</li>
            <li class="sidebar-item" onclick="window.location.href='pengaturan.html'">Pengaturan Toko</li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <header class="header_clean">
            <button onclick="document.getElementById('mainSidebar').classList.toggle('collapsed')">☰</button>
            <h3>Toko Mang Hadi</h3>
        </header>

        <div class="content-scroll">
            <div class="stat-grid">
                <div class="stat-card" style="background: #0284c7;">Total Barang: <span id="dashTotalBarang">0</span></div>
                <div class="stat-card" style="background: #dc2626;">Stok Krisis: <span id="dashStokKrisis">0</span></div>
                <div class="stat-card" style="background: #059669;">Total Agen: <span id="dashTotalCustomers">0</span></div>
            </div>

            <div class="menu-grid">
                <div class="menu-card" onclick="location.href='barang.html'">Master Barang</div>
                <div class="menu-card" onclick="location.href='penerimaan.html'">Stok Masuk</div>
                <div class="menu-card" onclick="location.href='agen.html'">Manajemen Kontak</div>
                <div class="menu-card" onclick="location.href='harga.html'">Harga Agen</div>
                <div class="menu-card" onclick="location.href='pos.html'">Kasir / POS</div>
                <div class="menu-card" onclick="location.href='laporan.html'">Laporan</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
