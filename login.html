<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multi Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-color: #0d9488; 
            --bg-main: #f1f5f9;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-sm: 8px;
            --radius-md: 12px;
            --font-family: 'Inter', sans-serif;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--bg-surface);
            padding: 40px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-logo { font-size: 48px; color: var(--primary-color); margin-bottom: 20px; }
        .login-title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .login-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
        }
        .input-group input:focus { outline: none; border-color: var(--primary-color); }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white; border: none;
            width: 100%; padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo"><i class="fa-solid fa-boxes-packing"></i></div>
        <h1 class="login-title">Login Sistem</h1>
        <p class="login-subtitle">Silakan masukkan email registrasi toko Anda</p>
        
        <div class="input-group">
            <label>Email Admin / Agen</label>
            <input type="email" id="email" placeholder="Contoh: admin@toko.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password Anda">
        </div>
        <p id="loginError" style="color: #ef4444; font-size: 14px; display: none; margin-bottom: 15px;"></p>
        <button class="btn-primary" id="btnLogin" onclick="handleLogin()">Masuk ke Sistem</button>
    </div>

    <script>
// CONFIG SUPABASE
const SUPABASE_URL = "https://fwmeuhqimqccjweabubx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3bWV1aHFpbXFjY2p3ZWFidWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTE5MDUsImV4cCI6MjA5NjcyNzkwNX0.og_qhG-b2Lv1lx1Rvq3k0BvdgfdIbqG_XDWUuBCeIno";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin() {
            const emailInput = document.getElementById('email').value;
            const passInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            const btnLogin = document.getElementById('btnLogin');
            
            errorMsg.style.display = 'none';
            btnLogin.innerText = "Memproses...";
            btnLogin.disabled = true;

            // 1. Auth ke Supabase
            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                email: emailInput,
                password: passInput
            });

            if(authError) {
                errorMsg.innerText = "Login gagal: " + authError.message;
                errorMsg.style.display = 'block';
                btnLogin.innerText = "Masuk ke Sistem";
                btnLogin.disabled = false;
                return;
            }

            // 2. Ambil data store_id dan nama dari tabel profiles
            const user = authData.user;
            const { data: profileData, error: profileError } = await supabaseClient
                .from('profiles')
                .select('store_id, role, full_name')
                .eq('id', user.id)
                .single();

            if (profileError || !profileData) {
                errorMsg.innerText = "Profil pengguna tidak terikat ke toko manapun.";
                errorMsg.style.display = 'block';
                btnLogin.innerText = "Masuk ke Sistem";
                btnLogin.disabled = false;
                return;
            }

            // 3. Simpan data krusial di LocalStorage agar bisa dibaca di halaman dashboard
            localStorage.setItem('session_store_id', profileData.store_id);
            localStorage.setItem('session_user_name', profileData.full_name);
            localStorage.setItem('session_user_role', profileData.role);

            // 4. Pindah ke Halaman Dashboard
            window.location.href = 'dashboard.html';
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
