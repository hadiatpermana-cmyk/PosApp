<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Point of Sale</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin: 20px;
        }

        /* Bagian Kiri - Branding / Visual */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .login-left::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
        }

        .login-left::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: 50px;
            left: -50px;
        }

        .brand-area {
            position: relative;
            z-index: 2;
        }

        .brand-area i {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .brand-area h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .brand-area p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        /* Bagian Kanan - Form Login */
        .login-right {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.3s;
            background-color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #0d9488;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .form-control:focus + i {
            color: #0d9488;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #0d9488;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }

        .btn-login:hover {
            background-color: #0f766e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3);
        }

        .btn-login:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #ef4444;
            background: #fef2f2;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 4px solid #ef4444;
            display: none;
        }

        /* Responsif untuk layar HP */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                height: auto;
                max-width: 400px;
            }
            .login-left {
                padding: 40px 30px;
                text-align: center;
            }
            .brand-area h1 { font-size: 28px; }
            .login-right {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-left">
            <div class="brand-area">
                <i class="fa-solid fa-store"></i>
                <h1>Sistem Manajemen<br>Multi Store</h1>
                <p>Kelola stok barang, atur harga agen khusus, dan pantau laporan penjualan Anda dalam satu dashboard terpadu yang modern.</p>
            </div>
            <div style="z-index: 2; font-size: 13px; color: rgba(255,255,255,0.6);">
                &copy; 2026 Administrator Panel
            </div>
        </div>

        <div class="login-right">
            <div class="form-header">
                <h2>Selamat Datang! 👋</h2>
                <p>Silakan masuk ke akun Anda untuk melanjutkan.</p>
            </div>

            <div id="errorBox" class="error-message"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Pengguna</label>
                    <div class="input-icon-wrapper">
                        <input type="email" id="inputEmail" class="form-control" placeholder="Masukkan email Anda..." required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kata Sandi</label>
                    <div class="input-icon-wrapper">
                        <input type="password" id="inputPassword" class="form-control" placeholder="Masukkan kata sandi..." required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="btn-login">
                    Masuk ke Dashboard <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = "https://fwmeuhqimqccjweabubx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3bWV1aHFpbXFjY2p3ZWFidWJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTE5MDUsImV4cCI6MjA5NjcyNzkwNX0.og_qhG-b2Lv1lx1Rvq3k0BvdgfdIbqG_XDWUuBCeIno";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Bersihkan session lama jika ada yang nyangkut di halaman login
        localStorage.clear();

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('inputEmail').value;
            const password = document.getElementById('inputPassword').value;
            const btn = document.getElementById('btnLogin');
            const errorBox = document.getElementById('errorBox');

            // State Loading
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memverifikasi...';
            btn.disabled = true;
            errorBox.style.display = 'none';

            try {
                // 1. Autentikasi dengan Supabase
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                // 2. Ambil data profil/toko terkait pengguna (jika Anda memiliki tabel relasi)
                // Default fallback jika belum ada query khusus:
                localStorage.setItem('session_user_name', 'Administrator');
                
                // Jika Anda punya ID toko spesifik, set di sini (Contoh ID toko sementara 1)
                localStorage.setItem('session_store_id', '1'); 

                // 3. Redirect ke halaman Dashboard PHP yang baru dibuat
                window.location.href = 'index.php';

            } catch (err) {
                // Tampilkan pesan error
                errorBox.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Email atau kata sandi tidak valid.`;
                errorBox.style.display = 'block';
                
                // Kembalikan tombol seperti semula
                btn.innerHTML = 'Masuk ke Dashboard <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
